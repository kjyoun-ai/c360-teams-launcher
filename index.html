<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C360 Analyst</title>
  <script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js"></script>
  <style>
    html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; color: #222; }
    body { display: flex; flex-direction: column; }
    #shell { padding: 24px; max-width: 640px; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { font-size: 14px; line-height: 1.5; color: #555; margin: 0 0 16px; }
    button { padding: 10px 18px; font-size: 14px; border: 0; border-radius: 6px; background: #FF3621; color: #fff; cursor: pointer; margin-right: 8px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #status { margin-top: 16px; font-size: 12px; color: #888; white-space: pre-wrap; font-family: ui-monospace, Menlo, monospace; }
    #frame { flex: 1; width: 100%; border: 0; display: none; }
  </style>
</head>
<body>
  <div id="shell">
    <h1>C360 Analyst</h1>
    <p>This launcher signs you into Databricks in a popup so the chat can load inside Teams. Click <b>Sign in</b> first. When the popup shows the C360 Analyst chat, close the popup — then click <b>Load chat</b>.</p>
    <button id="signin">Sign in</button>
    <button id="load" disabled>Load chat</button>
    <div id="status">Initializing...</div>
  </div>
  <iframe id="frame" title="C360 Analyst"></iframe>
  <script>
    const APP_URL = 'https://c360-chat-sandbox-ji-soo-yun-1132449496299224.aws.databricksapps.com/';
    const $ = (id) => document.getElementById(id);
    const log = (s) => { $('status').textContent += '\n' + new Date().toISOString().slice(11, 19) + ' ' + s; console.log('[launcher]', s); };
    const setStatus = (s) => { $('status').textContent = s; console.log('[launcher]', s); };

    let teamsReady = false;

    if (typeof microsoftTeams === 'undefined') {
      setStatus('ERROR: Teams SDK failed to load (CDN blocked?).');
    } else {
      microsoftTeams.app.initialize().then(() => {
        teamsReady = true;
        return microsoftTeams.app.getContext();
      }).then((ctx) => {
        setStatus('Teams SDK ready. host=' + (ctx?.app?.host?.name || 'unknown') + ' clientType=' + (ctx?.app?.host?.clientType || 'unknown'));
      }).catch((e) => {
        setStatus('Teams init failed: ' + (e?.message || e));
      });
    }

    $('signin').onclick = () => {
      if (!teamsReady) { log('Teams not ready; cannot open popup.'); return; }
      log('Opening Databricks sign-in popup...');
      microsoftTeams.authentication.authenticate({
        url: APP_URL,
        width: 800,
        height: 700,
        successCallback: (result) => {
          log('Popup closed (successCallback): ' + (result || '(no result)'));
          $('load').disabled = false;
        },
        failureCallback: (reason) => {
          log('Popup closed (failureCallback): ' + (reason || '(no reason)'));
          $('load').disabled = false;
        }
      });
    };

    $('load').onclick = () => {
      log('Loading iframe -> ' + APP_URL);
      const frame = $('frame');
      frame.onload = () => log('iframe load event fired');
      frame.onerror = (e) => log('iframe error: ' + e);
      frame.src = APP_URL;
      frame.style.display = 'block';
      $('shell').style.display = 'none';
    };
  </script>
</body>
</html>
