<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flexera Data Chat</title>
  <script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js"></script>
  <style>
    :root {
      --flexera-red: #FF3621;
      --text: #1f2937;
      --muted: #6b7280;
      --bg: #ffffff;
      --border: #e5e7eb;
      --note-bg: rgba(255, 54, 33, 0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text: #f3f4f6;
        --muted: #9ca3af;
        --bg: #1f2937;
        --border: #374151;
        --note-bg: rgba(255, 54, 33, 0.12);
      }
    }
    html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; color: var(--text); background: var(--bg); }
    body { display: flex; flex-direction: column; }
    #shell { padding: 40px 24px; max-width: 540px; margin: 0 auto; width: 100%; box-sizing: border-box; }
    h1 { font-size: 24px; margin: 0 0 12px; font-weight: 600; }
    p { font-size: 14px; line-height: 1.6; color: var(--muted); margin: 0 0 16px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
    button {
      padding: 10px 20px; font-size: 14px; font-weight: 500; border: 0; border-radius: 6px;
      background: var(--flexera-red); color: #fff; cursor: pointer; transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { background: #d1d5db; cursor: not-allowed; }
    button.secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .spinner {
      display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border);
      border-top-color: var(--flexera-red); border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .note {
      font-size: 13px; padding: 10px 12px; background: var(--note-bg);
      border-left: 3px solid var(--flexera-red); margin: 12px 0; color: var(--text);
      border-radius: 0 4px 4px 0;
    }
    .error { color: #dc2626; }
    #frame { flex: 1; width: 100%; border: 0; display: none; }
    .reauth-bar {
      position: fixed; bottom: 12px; right: 12px; padding: 6px 10px; background: rgba(0,0,0,0.7);
      color: #fff; font-size: 11px; border-radius: 4px; cursor: pointer; display: none; z-index: 10;
    }
    details { margin-top: 28px; font-size: 12px; }
    details summary { cursor: pointer; color: var(--muted); user-select: none; }
    details summary:hover { color: var(--text); }
    #status { margin-top: 8px; font-family: ui-monospace, Menlo, monospace; white-space: pre-wrap; word-break: break-word; color: var(--muted); font-size: 11px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="shell">
    <h1 id="title"><span class="spinner"></span>Loading C360 Analyst</h1>
    <p id="message">Checking your session&hellip;</p>

    <div class="note hidden" id="popup-instructions">
      <strong>A sign-in window will appear.</strong> After you sign in to Databricks, the window will <strong>close automatically</strong> and the chat will load here.
    </div>

    <div class="actions hidden" id="landing-actions">
      <button id="signin">Sign in to Databricks</button>
    </div>

    <div class="actions hidden" id="error-actions">
      <button id="retry">Retry sign-in</button>
      <button class="secondary" id="open-external">Open in browser</button>
    </div>

    <details>
      <summary>Diagnostic log</summary>
      <div id="status"></div>
    </details>
  </div>
  <iframe id="frame" title="C360 Analyst"></iframe>
  <div class="reauth-bar" id="reauth-bar" title="Sign in again">Re-authenticate</div>

  <script>
    const APP_URL = 'https://c360-mchat-sandbox-ji-soo-yun-1132449496299224.aws.databricksapps.com/';
    const AUTH_COMPLETE_URL = APP_URL + 'teams-auth-complete.html';
    // Query string forwarded into the app iframe when the tab was opened via a
    // deep link (subPageId "agent|question") — see parsing in getContext below.
    let deepLinkParams = '';
    // TTL controls how long the launcher skips the landing page on subsequent loads.
    // 30 days is well past any reasonable session refresh cadence; the iframe itself
    // will silently re-auth via Databricks Apps cookies as needed.
    const AUTH_TTL_MS = 30 * 24 * 60 * 60 * 1000; // 30 days
    const VERSION = 'datachat-launcher-v1.2.0';

    // After the iframe fires `load`, how long to wait for the app's ready ping
    // before concluding the iframe is on the Databricks login wall (not the
    // app) and auto-recovering. The app posts the ping inline the moment its
    // HTML parses, so this only needs to absorb a little script-execution lag.
    const APP_READY_TIMEOUT_MS = 6000;
    const appOrigin = new URL(APP_URL).origin;
    let appReady = false;
    let watchdogTimer = null;
    let autoRecoveryAttempts = 0;
    const MAX_AUTO_RECOVERY = 1;

    const $ = (id) => document.getElementById(id);
    const show = (id, visible) => $(id).classList.toggle('hidden', !visible);
    const setTitle = (t, withSpinner) => {
      $('title').innerHTML = (withSpinner ? '<span class="spinner"></span>' : '') + t;
    };
    const setMessage = (m, isError) => {
      $('message').textContent = m;
      $('message').className = isError ? 'error' : '';
    };
    const log = (s) => {
      const t = new Date().toISOString().slice(11, 19);
      $('status').textContent += t + ' ' + s + '\n';
      console.log('[launcher]', s);
    };

    const isLikelyAuthenticated = () => {
      try {
        const ts = parseInt(localStorage.getItem('c360_auth_ts') || '0', 10);
        return ts > 0 && (Date.now() - ts) < AUTH_TTL_MS;
      } catch { return false; }
    };
    const markAuthenticated = () => {
      try { localStorage.setItem('c360_auth_ts', Date.now().toString()); } catch {}
    };
    const clearAuth = () => {
      try { localStorage.removeItem('c360_auth_ts'); } catch {}
    };

    // The app's index.html posts this once it loads. Because the Databricks
    // Apps proxy 302s unauthenticated requests to OAuth *before* serving any
    // app HTML, receiving the ping is proof the session cookie is valid — so
    // we (re)stamp the TTL only here, on a confirmed good load, never
    // optimistically. The login wall lives on a different origin and never
    // sends it, which is exactly how we tell the two apart.
    window.addEventListener('message', (event) => {
      if (event.origin !== appOrigin) return;
      if (!event.data || event.data.type !== 'c360-app-ready') return;
      log('App-ready ping received — session valid.');
      appReady = true;
      autoRecoveryAttempts = 0;
      if (watchdogTimer) { clearTimeout(watchdogTimer); watchdogTimer = null; }
      markAuthenticated();
    });

    const showLandingAfterFailedLoad = () => {
      $('frame').style.display = 'none';
      $('frame').src = 'about:blank';
      $('shell').classList.remove('hidden');
      $('reauth-bar').style.display = 'none';
    };

    // Fires only when the iframe loaded but no ready ping arrived → the iframe
    // is showing the Databricks login wall (or another non-app page). Recover
    // automatically into the popup sign-in flow instead of stranding the user
    // on a broken login screen that needs a manual Re-authenticate click.
    const startReadyWatchdog = () => {
      if (watchdogTimer) clearTimeout(watchdogTimer);
      watchdogTimer = setTimeout(() => {
        watchdogTimer = null;
        if (appReady) return;
        clearAuth();
        if (autoRecoveryAttempts >= MAX_AUTO_RECOVERY) {
          // Popup recovery already tried once and the app still didn't ping.
          // Stop looping — fall back to the manual landing page.
          log('No app-ready ping after recovery — showing landing for manual sign-in.');
          showLandingAfterFailedLoad();
          showLanding();
          return;
        }
        autoRecoveryAttempts++;
        log('No app-ready ping after load — assuming login wall. Auto-recovering via sign-in popup.');
        $('frame').style.display = 'none';
        $('frame').src = 'about:blank';
        runAuthFlow();
      }, APP_READY_TIMEOUT_MS);
    };

    const loadApp = () => {
      // Don't stamp the TTL here — wait for the app-ready ping to confirm the
      // load actually reached the app rather than the login wall.
      appReady = false;
      log('Loading iframe -> ' + APP_URL);
      const frame = $('frame');
      frame.onload = () => {
        // Teardown navigations (recovery sets frame.src='about:blank') also
        // fire `load` and would arm a phantom watchdog that can interrupt the
        // next legitimate load — ignore them.
        if (frame.src === 'about:blank') return;
        log('iframe load event fired');
        // The login wall fires `load` too, so a successful onload isn't enough.
        // Wait briefly for the ready ping; its absence means we're not on the app.
        if (!appReady) startReadyWatchdog();
      };
      frame.src = APP_URL + deepLinkParams;
      frame.style.display = 'block';
      $('shell').classList.add('hidden');
      $('reauth-bar').style.display = 'block';
    };

    const showLanding = () => {
      setTitle('Welcome to C360 Analyst', false);
      setMessage('Sign in to Databricks to start chatting. You’ll stay signed in for 30 days.', false);
      show('landing-actions', true);
      show('popup-instructions', false);
      show('error-actions', false);
    };

    const runAuthFlow = () => {
      setTitle('Opening sign-in window', true);
      setMessage('Complete the Databricks sign-in in the popup. It will close automatically.', false);
      show('landing-actions', false);
      show('popup-instructions', true);
      show('error-actions', false);
      log('Opening popup -> ' + AUTH_COMPLETE_URL);
      microsoftTeams.authentication.authenticate({
        url: AUTH_COMPLETE_URL,
        width: 800,
        height: 700,
        successCallback: (result) => {
          log('Popup closed (success): ' + (result || '(no result)'));
          loadApp();
        },
        failureCallback: (reason) => {
          log('Popup closed (failure): ' + (reason || '(no reason)'));
          // Even on "failure" (user closed without notifySuccess), cookies may be set.
          // Attempt to load — if cookies aren't valid, user can hit reauth.
          loadApp();
        }
      });
    };

    const showFatalError = (msg) => {
      setTitle('Couldn\'t load C360 Analyst', false);
      setMessage(msg, true);
      show('error-actions', true);
      show('landing-actions', false);
      show('popup-instructions', false);
    };

    // A manual user action is a fresh intent — cancel any pending watchdog and
    // reset the auto-recovery budget so the popup flow is available again.
    const resetRecoveryState = () => {
      if (watchdogTimer) { clearTimeout(watchdogTimer); watchdogTimer = null; }
      autoRecoveryAttempts = 0;
    };

    $('signin').onclick = () => { resetRecoveryState(); runAuthFlow(); };
    $('retry').onclick = () => { resetRecoveryState(); clearAuth(); runAuthFlow(); };
    $('open-external').onclick = () => {
      microsoftTeams.app.openLink(APP_URL).catch(() => window.open(APP_URL, '_blank'));
    };
    $('reauth-bar').onclick = () => {
      resetRecoveryState();
      clearAuth();
      $('frame').style.display = 'none';
      $('frame').src = 'about:blank';
      $('shell').classList.remove('hidden');
      $('reauth-bar').style.display = 'none';
      showLanding();
    };

    log(VERSION + ' loaded');

    if (typeof microsoftTeams === 'undefined') {
      showFatalError('Microsoft Teams SDK failed to load (CDN blocked?). Open in browser instead.');
    } else {
      microsoftTeams.app.initialize()
        .then(() => microsoftTeams.app.getContext())
        .then((ctx) => {
          log('Teams ready. host=' + (ctx?.app?.host?.name || '?') + ' client=' + (ctx?.app?.host?.clientType || '?'));
          // Deep links carry context.subEntityId -> ctx.page.subPageId.
          // Format: "<agent-slug-or-alias>|<urlencoded-question>" (question
          // optional; it is URL-encoded because Teams drops sub-entity ids
          // containing spaces). Forwarded to the app as ?agent=&query=; the
          // app selects the agent and auto-sends the question.
          const parseSubPageId = (sub) => {
            const sep = sub.indexOf('|');
            const agent = sep >= 0 ? sub.slice(0, sep) : sub;
            let query = sep >= 0 ? sub.slice(sep + 1) : '';
            try { query = decodeURIComponent(query); } catch (_) { /* keep raw */ }
            const p = new URLSearchParams();
            if (agent) p.set('agent', agent);
            if (query) p.set('query', query);
            return p.toString() ? '?' + p.toString() : '';
          };
          let lastSubPageId = ctx?.page?.subPageId || '';
          if (lastSubPageId) {
            deepLinkParams = parseSubPageId(lastSubPageId);
            log('Deep link: ' + lastSubPageId.slice(0, 40));
          }
          // Teams keeps recently-used personal tabs MOUNTED: a deep link
          // clicked while this tab is alive never remounts the iframe, so the
          // init-time context read above would silently miss it. Poll for a
          // changed subPageId and reload the app with the new ask.
          setInterval(() => {
            microsoftTeams.app.getContext().then((c) => {
              const cur = c?.page?.subPageId || '';
              if (cur && cur !== lastSubPageId) {
                lastSubPageId = cur;
                deepLinkParams = parseSubPageId(cur);
                log('Deep link while mounted: ' + cur.slice(0, 40) + ' — reloading app');
                loadApp();
              }
            }).catch(() => { /* transient SDK hiccup; next tick retries */ });
          }, 2000);
          if (isLikelyAuthenticated()) {
            log('Recent auth detected (TTL valid) — loading app directly.');
            loadApp();
          } else {
            log('No recent auth — showing landing.');
            showLanding();
          }
        })
        .catch((e) => {
          showFatalError('Teams SDK init failed: ' + (e?.message || e));
        });
    }
  </script>
</body>
</html>
